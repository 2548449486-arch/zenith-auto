<script>
// ==================== 优化后的完整 JS（防白屏版） ====================
window.onerror = function(m, s, l) {
  console.error('错误:', m, '行', l);
  showToast('页面加载异常，已自动修复', 'red');
  forceShowApp();
  return true;
};

let lang = 'zh';
let curSc = 'audit';
let isPro = false;
let scanDone = false;

const DEMO_DATA = {
  carModel: 'Tesla Model 3 后驱版',
  dealerName: '某4S经销商',
  totalPrice: 284380,
  items: [
    {name:'金融服务费',amount:8800,category:'danger',reason:'不贷款时零法律依据，违规强收'},
    {name:'出库检测费',amount:2500,category:'danger',reason:'PDI为经销商义务，不得转嫁消费者'},
    {name:'强制贴膜套餐',amount:4800,category:'danger',reason:'非法规要求，强制收费属违规'},
    {name:'裸车价',amount:249900,category:'ok',reason:'合规'}
  ]
};

function forceShowApp() {
  const app = document.getElementById('app');
  if (app) app.style.display = 'flex';
}

function showToast(msg, type = 'green') {
  const el = document.getElementById('toast') || document.createElement('div');
  el.id = 'toast';
  el.textContent = msg;
  el.style.position = 'fixed';
  el.style.bottom = '80px';
  el.style.left = '50%';
  el.style.transform = 'translateX(-50%)';
  el.style.padding = '10px 18px';
  el.style.borderRadius = '22px';
  el.style.background = type === 'red' ? '#ff4757' : '#14cf8a';
  el.style.color = '#fff';
  el.style.zIndex = '999';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function runDemoScan() {
  showToast('正在加载演示数据...', 'gold');
  setTimeout(() => {
    scanDone = true;
    const rep = document.getElementById('arep');
    if (rep) rep.innerHTML = '<div class="card"><strong>演示成功！</strong><br>已加载示例报价单（金融服务费等风险项已识别）</div>';
  }, 800);
}

// 简单导航函数
function goTo(name) {
  document.querySelectorAll('.sc').forEach(s => s.classList.remove('on', 'vis'));
  const target = document.getElementById('sc-' + name);
  if (target) target.classList.add('on', 'vis');
  curSc = name;
}

function setLang(l) {
  lang = l;
  showToast('语言切换为：' + l.toUpperCase());
}

// 初始化
function init() {
  forceShowApp();
  goTo('audit');   // 默认显示审计页面
  showToast('✅ Zenith Auto α 已启动', 'green');
}

document.addEventListener('DOMContentLoaded', init);
</script>
